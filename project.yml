name: MotionBrush
options:
  bundleIdPrefix: com.motionbrush
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"          # iPhone only (FR-3.3)
    CODE_SIGNING_ALLOWED: "NO"           # simulator builds need no signing
    CODE_SIGNING_REQUIRED: "NO"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  MotionBrush:
    type: application
    platform: iOS
    sources:
      - path: MotionBrush
      - path: fixtures
        buildPhase: resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.motionbrush.app
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSCameraUsageDescription: "Film something that moves to make a brush."
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIStatusBarHidden: "YES"
  MotionBrushTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MotionBrushTests
    dependencies:
      - target: MotionBrush
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
